name: 上游仓库自动同步与代码编辑

on:
  # 定时触发（每天凌晨2点）
  schedule:
    - cron: '0 2 * * *'
  # 手动触发
  workflow_dispatch:
  # 上游仓库推送触发（需在上游仓库配置webhook）
  repository_dispatch:
    types: [upstream-push]

jobs:
  sync-and-edit:
    runs-on: ubuntu-latest
    env:
      UPSTREAM_REPO: Fansirsqi/Sesame-TK  # 上游仓库地址
      UPSTREAM_BRANCH: main               # 上游分支
      TARGET_BRANCH: develop              # 目标分支
      AUTO_EDIT: true                     # 是否执行自动编辑
      GIT_USERNAME: GitHub Actions        # 提交用户名
      GIT_EMAIL: actions@github.com       # 提交邮箱

    steps:
      # 1. 检出当前仓库代码
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0  # 获取完整历史

      # 2. 配置上游仓库并拉取更新
      - name: 配置上游仓库
        run: |
          git remote add upstream https://github.com/${{ env.UPSTREAM_REPO }}.git || true
          git fetch upstream ${{ env.UPSTREAM_BRANCH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 3. 合并上游更新
      - name: 合并上游更新
        id: merge
        run: |
          # 记录合并前的提交
          OLD_COMMIT=$(git rev-parse HEAD)
          
          # 执行合并
          git merge upstream/${{ env.UPSTREAM_BRANCH }} -m "Auto merge from upstream: ${{ env.UPSTREAM_BRANCH }}"
          
          # 记录合并后的提交
          NEW_COMMIT=$(git rev-parse HEAD)
          
          # 检查是否有变更
          if [ "$OLD_COMMIT" != "$NEW_COMMIT" ]; then
            echo "HAS_CHANGES=true" >> $GITHUB_ENV
            echo "CHANGED_FILES=$(git diff --name-only $OLD_COMMIT $NEW_COMMIT | tr '\n' ',')" >> $GITHUB_ENV
            echo "COMMIT_MESSAGE=$(git log -1 --pretty=format:'%s')" >> $GITHUB_ENV
          else
            echo "HAS_CHANGES=false" >> $GITHUB_ENV
          fi
        continue-on-error: true  # 允许合并失败

      # 4. 处理合并冲突（可选）
      - name: 处理合并冲突
        if: failure() && steps.merge.outcome == 'success'
        run: |
          echo "检测到合并冲突，尝试自动解决..."
          # 获取冲突文件列表
          CONFLICT_FILES=$(git diff --name-only --diff-filter=U)
          
          # 根据文件类型选择合并策略（示例：对Java文件使用上游版本）
          for file in $CONFLICT_FILES; do
            if [[ $file == *.java ]]; then
              git checkout --theirs $file
            else
              git checkout --ours $file
            fi
            git add $file
          done
          
          # 提交冲突解决方案
          if [[ -n $(git status --porcelain) ]]; then
            git commit -m "Auto resolve conflicts"
            echo "HAS_CHANGES=true" >> $GITHUB_ENV
          else
            echo "无法自动解决冲突，终止工作流"
            exit 1
          fi

      # 5. 自动编辑代码（仅当有更新时执行）
      - name: 自动编辑代码
        if: env.HAS_CHANGES == 'true' && env.AUTO_EDIT == 'true'
        id: auto-edit
        run: |
          # 示例1：更新版本号（在build.gradle中）
          if [ -f "app/build.gradle" ]; then
            CURRENT_VERSION=$(grep -E 'versionName ".*"' app/build.gradle | awk -F'"' '{print $2}')
            NEW_VERSION="${CURRENT_VERSION}-$(date +%Y%m%d)-$(git rev-parse --short HEAD)"
            sed -i "s/versionName \"${CURRENT_VERSION}\"/versionName \"${NEW_VERSION}\"/" app/build.gradle
            echo "版本号更新: ${CURRENT_VERSION} → ${NEW_VERSION}"
          fi
          
          # 示例2：更新README时间戳
          if [ -f "README.md" ]; then
            TIMESTAMP="Last updated: $(date '+%Y-%m-%d %H:%M:%S %Z')"
            sed -i "s/<!-- AUTO_UPDATE -->.*/<!-- AUTO_UPDATE --> ${TIMESTAMP}/" README.md
          fi
          
          # 检查是否有编辑变更
          if [[ -n $(git status --porcelain) ]]; then
            echo "EDIT_CHANGES=true" >> $GITHUB_OUTPUT
            echo "编辑完成，有变更"
          else
            echo "EDIT_CHANGES=false" >> $GITHUB_OUTPUT
            echo "编辑完成，无变更"
          fi

      # 6. 提交编辑变更（如果有）
      - name: 提交编辑变更
        if: steps.auto-edit.outputs.EDIT_CHANGES == 'true'
        run: |
          git config user.name "${{ env.GIT_USERNAME }}"
          git config user.email "${{ env.GIT_EMAIL }}"
          git add .
          git commit -m "Auto edit after sync"

      # 7. 推送更新到目标分支
      - name: 推送更新
        if: env.HAS_CHANGES == 'true'
        run: |
          git push origin ${{ env.TARGET_BRANCH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
