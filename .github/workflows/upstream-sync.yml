name: 上游仓库自动同步与代码编辑

on:
  schedule:
    - cron: '59 15 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [upstream-push]

jobs:
  sync-and-edit:
    runs-on: ubuntu-latest
    env:
      UPSTREAM_REPO: Fansirsqi/Sesame-TK  # 上游仓库
      UPSTREAM_BRANCH: main               # 上游分支
      TARGET_BRANCH: main                 # 修改为实际存在的分支名称
      AUTO_EDIT: true
      GIT_USERNAME: GitHub Actions
      GIT_EMAIL: actions@github.com

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}  # 使用实际分支名称
          fetch-depth: 0

      - name: 配置上游仓库
        run: |
          git remote add upstream https://github.com/${{ env.UPSTREAM_REPO }}.git || true
          git fetch upstream ${{ env.UPSTREAM_BRANCH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 后续步骤保持不变...
