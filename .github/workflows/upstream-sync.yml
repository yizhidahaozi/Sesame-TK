name: 上游仓库自动同步与代码编辑

on:
  # 定时触发：每周一 8:00 执行（可根据需求修改cron表达式）
  schedule:
    - cron: "0 8 * * 1"
  # 手动触发：可通过GitHub Actions界面手动运行
  workflow_dispatch:
  # 上游仓库推送触发（需配合webhook，适用于主从仓库场景）
  repository_dispatch:
    types: [upstream-push]

jobs:
  sync-and-edit:
    runs-on: ubuntu-latest
    env:
      UPSTREAM_BRANCH: main          # 上游仓库分支
      LOCAL_BRANCH: develop         # 本地仓库分支
      AUTO_EDIT_SCRIPTS: scripts    # 自动编辑脚本目录

    steps:
      # 1. 检出当前仓库代码
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # 获取完整Git历史，便于后续合并

      # 2. 配置上游仓库远程地址（需替换为实际上游仓库）
      - name: 配置上游仓库远程
        run: |
          # 添加上游仓库（格式：https://github.com/上游用户名/上游仓库名.git）
          git remote add upstream https://github.com/upstream-owner/upstream-repo.git || true
          # 拉取上游仓库所有分支
          git fetch upstream --prune
          echo "上游仓库分支列表: $(git branch -r | grep upstream)"
        env:
          # 若上游为私有仓库，需配置访问令牌（在仓库Secrets中设置UPSTREAM_TOKEN）
          GIT_AUTHOR_NAME: GitHub Actions
          GIT_COMMITTER_NAME: GitHub Actions
          GIT_AUTHOR_EMAIL: actions@github.com
          GIT_COMMITTER_EMAIL: actions@github.com

      # 3. 拉取并合并上游更新
      - name: 拉取并合并上游更新
        run: |
          # 切换到本地分支
          git checkout ${{ env.LOCAL_BRANCH }}
          # 保存当前本地修改（如有）
          git stash save "Auto-sync stash" || true
          # 从上游拉取最新代码
          git pull upstream ${{ env.UPSTREAM_BRANCH }} --rebase
          # 恢复本地修改（可选，需根据实际需求决定是否保留）
          git stash pop || true
          # 查看合并状态
          git status
        # 合并失败时终止作业（可根据需求调整为继续执行）
        continue-on-error: false

      # 4. 自动代码编辑（示例：包含多种编辑方式）
      - name: 自动编辑代码
        id: code-edit
        run: |
          CHANGED=false
          
          # ===== 方式1：使用sed直接修改文件 =====
          # 示例1：更新build.gradle中的版本号
          if [ -f "app/build.gradle" ]; then
            CURRENT_VERSION=$(grep -E 'versionName ".*"' app/build.gradle | awk -F'"' '{print $2}')
            NEW_VERSION="${CURRENT_VERSION}.${{ github.run_id: -5 }}"  # 追加运行ID后缀
            sed -i "s/versionName \"${CURRENT_VERSION}\"/versionName \"${NEW_VERSION}\"/" app/build.gradle
            echo "✓ 版本号更新: ${CURRENT_VERSION} → ${NEW_VERSION}"
            CHANGED=true
          fi
          
          # 示例2：替换XML文件中的字符串
          find . -type f -name "strings.xml" -exec sed -i "s/Last updated: .*/Last updated: $(date '+%Y-%m-%d')/g" {} \;
          if [ $(find . -type f -name "strings.xml" -exec git diff --quiet {} \; && echo 0 || echo 1) -eq 1 ]; then
            echo "✓ 更新strings.xml时间戳"
            CHANGED=true
          fi
          
          # ===== 方式2：运行Python脚本编辑 =====
          # 确保脚本目录存在
          mkdir -p ${{ env.AUTO_EDIT_SCRIPTS }}
          # 示例：运行自定义Python脚本（需提前放入scripts目录）
          if [ -f "${{ env.AUTO_EDIT_SCRIPTS }}/edit_script.py" ]; then
            python3 "${{ env.AUTO_EDIT_SCRIPTS }}/edit_script.py"
            if [ $? -eq 0 ]; then
              echo "✓ 执行Python编辑脚本成功"
              CHANGED=true
            fi
          fi
          
          # ===== 方式3：使用Gradle脚本修改配置 =====
          # 示例：通过Gradle命令更新依赖（需项目支持）
          if [ -f "build.gradle" ]; then
            ./gradlew updateDependencies --quiet
            if [ $(git diff --quiet && echo 0 || echo 1) -eq 1 ]; then
              echo "✓ 更新依赖库"
              CHANGED=true
            fi
          fi
          
          # 输出变更状态
          if [ "$CHANGED" = "true" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            git status --short
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "无代码变更，跳过提交"
          fi

      # 5. 提交并推送变更（仅当有变更时执行）
      - name: 提交并推送变更
        if: ${{ steps.code-edit.outputs.changed == 'true' }}
        run: |
          # 配置提交信息
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          # 添加所有变更文件
          git add .
          # 生成提交信息
          COMMIT_MSG="自动同步上游更新并编辑代码 (${{ env.UPSTREAM_BRANCH }} → ${{ env.LOCAL_BRANCH }})"
          # 提交变更
          git commit -m "$COMMIT_MSG"
          # 推送变更到远程仓库（使用GITHUB_TOKEN或自定义PAT）
          git push origin ${{ env.LOCAL_BRANCH }}
        env:
          # 若推送需要额外权限，可在此配置令牌（如私有仓库）
          # GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 6. 发送通知（可选，支持Telegram、邮件等）
      - name: 发送同步结果通知
        if: ${{ always() }}  # 无论成功失败都发送通知
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TG_CHAT_ID || '' }}
          token: ${{ secrets.TG_BOT_TOKEN || '' }}
          message: |
            🚀 上游仓库同步结果:
            - 上游分支: ${{ env.UPSTREAM_BRANCH }}
            - 本地分支: ${{ env.LOCAL_BRANCH }}
            - 变更状态: ${{ steps.code-edit.outputs.changed == 'true' && '有变更并推送' || '无变更' }}
            - 查看详情: ${{ github.server_url }}/${{ github.repository }}/commits/${{ env.LOCAL_BRANCH }}
          # 仅在有TG配置时执行
          if: ${{ secrets.TG_CHAT_ID && secrets.TG_BOT_TOKEN }}
