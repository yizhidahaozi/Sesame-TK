- name: 合并上游变更
  id: merge
  run: |
    git config user.name "${{ env.GIT_USERNAME }}"
    git config user.email "${{ env.GIT_EMAIL }}"
    
    # 获取当前分支和上游分支的最新提交哈希
    CURRENT_COMMIT=$(git rev-parse HEAD)
    UPSTREAM_COMMIT=$(git rev-parse upstream/${{ env.UPSTREAM_BRANCH }})
    
    echo "当前分支最新提交: $CURRENT_COMMIT"
    echo "上游分支最新提交: $UPSTREAM_COMMIT"
    
    # 检查是否需要合并（使用git status替代哈希比较）
    if git status --short | grep -q upstream; then
      echo "检测到上游分支有新变更"
      SHOULD_MERGE=true
    else
      echo "无需合并，分支已是最新状态"
      SHOULD_MERGE=false
    fi
    
    if [ "$SHOULD_MERGE" = true ]; then
      # 尝试合并上游分支
      if [ "${{ env.MERGE_STRATEGY }}" = "ours" ]; then
        git merge -s ours --no-commit upstream/${{ env.UPSTREAM_BRANCH }} || true
        git commit -m "Merge upstream/${{ env.UPSTREAM_BRANCH }} into ${{ env.TARGET_BRANCH }} using 'ours' strategy"
        echo "使用'ours'策略合并成功"
      else
        git merge --no-ff upstream/${{ env.UPSTREAM_BRANCH }} -m "Merge upstream/${{ env.UPSTREAM_BRANCH }} into ${{ env.TARGET_BRANCH }}"
        
        if [ $? -ne 0 ]; then
          echo "合并失败，发生冲突"
          # 自动解决冲突的示例（使用上游版本）
          git checkout --theirs .
          git add .
          git commit -m "Auto-resolve conflicts by using upstream version"
          echo "已自动解决冲突"
        fi
      fi
      
      echo "合并成功"
      echo "should_merge=true" >> $GITHUB_OUTPUT
    else
      echo "should_merge=false" >> $GITHUB_OUTPUT
    fi
  shell: /usr/bin/bash -e {0}
  env:
    UPSTREAM_REPO: Fansirsqi/Sesame-TK
    UPSTREAM_BRANCH: main
    TARGET_BRANCH: main
    AUTO_EDIT: true
    GIT_USERNAME: GitHub Actions
    GIT_EMAIL: actions@github.com
    MERGE_STRATEGY: ours
